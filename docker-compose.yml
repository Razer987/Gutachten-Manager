# =============================================================================
# docker-compose.yml — Gutachten-Manager
# =============================================================================
# Liegt im Projektstamm, damit "docker compose up" ohne Flags funktioniert.
# Alle Pfade sind relativ zum Projektstamm.
#
# ERSTSTART / RESET (deterministisch, ohne Altlasten):
#   docker compose down -v && docker compose up --build -d
#
#   -v entfernt alle Volumes inkl. des PostgreSQL-Datenverzeichnisses.
#   PostgreSQL initialisiert dann User + Datenbank neu aus den Env-Variablen.
#   PFLICHT nach jeder Aenderung von DATABASE_USER oder DATABASE_PASSWORD.
#
# Normaler Neustart (Daten bleiben erhalten):
#   docker compose up --build -d
#
# Logs:     docker compose logs -f
# Status:   docker compose ps
# =============================================================================

# Fixer Projektname — unabhaengig vom Ordnernamen
name: gutachten-manager

services:

  # ---------------------------------------------------------------------------
  # NGINX — Reverse-Proxy (Port 80 → Web:3000 / API:4000)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: gutachten_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - gutachten_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          memory: 64M

  # ---------------------------------------------------------------------------
  # WEB — Next.js Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: gutachten_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - gutachten_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # API — Express.js Backend (mit automatischer DB-Migration beim Start)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: gutachten_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${DATABASE_USER:?DATABASE_USER muss in .env gesetzt sein}:${DATABASE_PASSWORD:?DATABASE_PASSWORD muss in .env gesetzt sein}@db:5432/${DATABASE_NAME:?DATABASE_NAME muss in .env gesetzt sein}?schema=public
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 2 * * *}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - backups_data:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - gutachten_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # DB — PostgreSQL Datenbank
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: gutachten_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME muss in .env gesetzt sein}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER muss in .env gesetzt sein}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD muss in .env gesetzt sein}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Kein Port-Mapping: DB ist nur intern erreichbar (kein direkter Host-Zugriff)
    healthcheck:
      # psql -c '\q' versucht eine echte Verbindung als DATABASE_USER zur
      # DATABASE_NAME herzustellen — prueft Authentifizierung + DB-Existenz,
      # nicht nur ob PostgreSQL TCP-Verbindungen annimmt (pg_isready).
      test: ["CMD-SHELL", "psql -U ${DATABASE_USER} -d ${DATABASE_NAME} -c '\\q' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gutachten_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: gutachten_postgres_data
  uploads_data:
    driver: local
    name: gutachten_uploads
  logs_data:
    driver: local
    name: gutachten_logs
  backups_data:
    driver: local
    name: gutachten_backups
  nginx_logs:
    driver: local
    name: gutachten_nginx_logs

# =============================================================================
# NETZWERK
# =============================================================================
networks:
  gutachten_network:
    driver: bridge
    name: gutachten_network
