# =============================================================================
# infrastructure/docker-compose.yml — Alternative Compose-Datei
# =============================================================================
# Identisch mit der Root-Compose-Datei, aber mit Port 5432 nach außen gemappt
# (nützlich für Prisma Studio / direkten DB-Zugriff vom Host).
#
# Verwendung (immer vom PROJEKTSTAMM aus, nicht aus diesem Verzeichnis!):
#   docker compose -f infrastructure/docker-compose.yml up --build -d
#
# Für den normalen Einsatz: docker-compose.yml im Projektstamm verwenden.
# =============================================================================

name: gutachten-manager

services:

  nginx:
    image: nginx:1.27-alpine
    container_name: gutachten_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - gutachten_network

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: gutachten_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - gutachten_network

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: gutachten_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "4000"
      DATABASE_URL: "postgresql://${DATABASE_USER:?DATABASE_USER fehlt in .env}:${DATABASE_PASSWORD:?DATABASE_PASSWORD fehlt in .env}@db:5432/${DATABASE_NAME:?DATABASE_NAME fehlt in .env}?schema=public"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      UPLOAD_DIR: /app/uploads
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/logs
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 2 * * *}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
      - backups_data:/app/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - gutachten_network

  db:
    image: postgres:16-alpine
    container_name: gutachten_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:?DATABASE_NAME fehlt in .env}
      POSTGRES_USER: ${DATABASE_USER:?DATABASE_USER fehlt in .env}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD fehlt in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - gutachten_network

volumes:
  postgres_data:
    driver: local
    name: gutachten_postgres_data
  uploads_data:
    driver: local
    name: gutachten_uploads
  logs_data:
    driver: local
    name: gutachten_logs
  backups_data:
    driver: local
    name: gutachten_backups
  nginx_logs:
    driver: local
    name: gutachten_nginx_logs

networks:
  gutachten_network:
    driver: bridge
    name: gutachten_network
